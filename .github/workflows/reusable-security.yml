name: Reusable Security Pipeline

on:
  workflow_call:
    inputs:
      image-name:
        required: true
        type: string
        description: "Name of the image to build (e.g. my-app)"
      working-directory:
        required: true
        type: string
        description: "Directory containing the Dockerfile"
      image-tag:
        required: false
        type: string
        default: "latest"
        description: "Tag for the image"

jobs:
  security-release:
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
      id-token: write
      security-events: write
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate image tag
        id: generate-tag
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          SHORT_SHA=$(echo "$COMMIT_SHA" | cut -c1-7)
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          TAG="${TIMESTAMP}-${SHORT_SHA}"

          echo "tag=${TAG}"              >> "$GITHUB_OUTPUT"
          echo "short-sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "timestamp=${TIMESTAMP}" >> "$GITHUB_OUTPUT"
          echo "Generated tag: ${TAG}"

      - name: Lint Dockerfile with Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ inputs.working-directory }}/Dockerfile
          config: .hadolint.yaml
          failure-threshold: warning

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.working-directory }}
          file: ${{ inputs.working-directory }}/Dockerfile
          push: false
          load: true
          tags: |
            ${{ inputs.image-name }}:${{ steps.generate-tag.outputs.tag }}
            ${{ inputs.image-name }}:${{ steps.generate-tag.outputs.short-sha }}
            ${{ inputs.image-name }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.generate-tag.outputs.timestamp }}
            org.opencontainers.image.title=${{ inputs.image-name }}

      - name: Scan image with Trivy (SARIF)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: "${{ inputs.image-name }}:${{ steps.generate-tag.outputs.tag }}"
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
          trivyignores: ${{ inputs.working-directory }}/.trivyignore

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: ${{ inputs.image-name }}

      - name: Fail on critical or high vulnerabilities
        env:
          IMAGE_NAME: ${{ inputs.image-name }}
        run: |
          COUNT=$(jq '[.runs[].results[]] | length' trivy-results.sarif 2>/dev/null || echo "0")
          if [ "$COUNT" -gt 0 ]; then
            echo "::error::${COUNT} CRITICAL/HIGH vulnerabilities found in ${IMAGE_NAME}. Check the Security tab."
            exit 1
          fi
          echo "No CRITICAL/HIGH vulnerabilities found in ${IMAGE_NAME}."

      - name: Security summary
        if: always()
        env:
          IMAGE_NAME: ${{ inputs.image-name }}
          COMMIT_SHA: ${{ github.sha }}
          GIT_REF: ${{ github.ref }}
          TAG: ${{ steps.generate-tag.outputs.tag }}
          SHORT_SHA: ${{ steps.generate-tag.outputs.short-sha }}
        run: |
          {
            echo "## Security Scan: ${IMAGE_NAME}"
            echo ""
            echo "| Field  | Value |"
            echo "| ------ | ----- |"
            echo "| Image  | \`${IMAGE_NAME}:${TAG}\` |"
            echo "| SHA    | \`${SHORT_SHA}\` |"
            echo "| Commit | \`${COMMIT_SHA}\` |"
            echo "| Ref    | \`${GIT_REF}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
